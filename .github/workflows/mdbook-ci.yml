# 任意 PR 与主分支推送时校验本书可构建（与 deploy 中的 build 步骤一致）
name: mdBook build

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npm ci (highlight.js for Move highlight test)
        run: npm ci

      - name: mdbook build
        run: mdbook build

      - name: Move syntax highlight (hljs 10)
        run: npm run test:move-highlight
